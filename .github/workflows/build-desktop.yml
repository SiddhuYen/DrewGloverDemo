name: build-desktop

# Builds the downloadable Mac (.dmg) and Windows (.zip) apps. Runs on demand and
# on every version tag; a tag also publishes the installers to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: WarmIntroPathfinder-macos
          - os: windows-latest
            artifact: WarmIntroPathfinder-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview platformdirs pyinstaller zipp httpx
          python -m spacy download en_core_web_sm

      - name: Build with PyInstaller
        run: pyinstaller build/pathfinder.spec --noconfirm --distpath dist --workpath build/work

      - name: Package (macOS .dmg)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Warm Intro Pathfinder" \
            -srcfolder "dist/WarmIntroPathfinder.app" -ov -format UDZO \
            "dist/WarmIntroPathfinder.dmg"

      - name: Package (Windows .zip)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/WarmIntroPathfinder/* -DestinationPath dist/WarmIntroPathfinder-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/WarmIntroPathfinder.dmg
            dist/WarmIntroPathfinder-windows.zip
          if-no-files-found: ignore

      - name: Publish to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WarmIntroPathfinder.dmg
            dist/WarmIntroPathfinder-windows.zip
          fail_on_unmatched_files: false
