name: build-desktop

# Builds the downloadable Mac (.dmg) and Windows (.zip) apps. Runs on demand and
# on every version tag; a tag also publishes both installers to a GitHub Release
# from a single release job (so the two build jobs never race to publish).
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: WarmIntroPathfinder-macos
          - os: windows-latest
            artifact: WarmIntroPathfinder-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pywebview platformdirs pyinstaller zipp httpx
          python -m spacy download en_core_web_sm

      - name: Windows webview backend (pywebview uses EdgeChromium via pythonnet)
        if: runner.os == 'Windows'
        run: pip install pythonnet

      # Bakes the LiteLLM proxy's virtual key into the build (see deploy/README.md).
      # LITELLM_VIRTUAL_KEY is NOT the real Anthropic key — it's a proxy-issued
      # credential, worthless without the proxy in front of it. Never committed
      # — generated fresh here from repo secrets, read once by desktop/main.py
      # at app startup, then bundled inside the .app/.exe like any other
      # resource. Skipped (writes nothing) if the secret isn't set, so a fork
      # or a build without the secret still produces a working app — the
      # classifier just no-ops, same as any other missing API key.
      - name: Bake in the LiteLLM proxy key
        shell: bash
        env:
          LITELLM_VIRTUAL_KEY: ${{ secrets.LITELLM_VIRTUAL_KEY }}
          CLAUDE_API_BASE: ${{ secrets.CLAUDE_API_BASE }}
        run: |
          if [ -n "$LITELLM_VIRTUAL_KEY" ]; then
            python -c "
          import json, os
          json.dump(
              {'virtual_key': os.environ.get('LITELLM_VIRTUAL_KEY', ''),
               'base': os.environ.get('CLAUDE_API_BASE', '')},
              open('resources/litellm_key.json', 'w'),
          )
          "
          else
            echo "LITELLM_VIRTUAL_KEY secret not set — building without a baked key"
          fi

      - name: Build with PyInstaller
        run: pyinstaller build/pathfinder.spec --noconfirm --distpath dist --workpath build/work

      - name: Package (macOS .dmg)
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname "Warm Intro Pathfinder" \
            -srcfolder "dist/WarmIntroPathfinder.app" -ov -format UDZO \
            "dist/WarmIntroPathfinder.dmg"

      - name: Package (Windows .zip)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/WarmIntroPathfinder/* -DestinationPath dist/WarmIntroPathfinder-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/WarmIntroPathfinder.dmg
            dist/WarmIntroPathfinder-windows.zip
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish both installers to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/WarmIntroPathfinder.dmg
            dist/**/WarmIntroPathfinder-windows.zip
          fail_on_unmatched_files: false
