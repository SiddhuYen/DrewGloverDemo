# LiteLLM proxy config — the thing that sits between Drew's app and Anthropic.
#
# WHY THIS EXISTS: a downloadable Mac/Windows app can never hold a secret —
# anyone with the installer can extract a key baked into the binary. So the
# app is never given the real Anthropic key. Instead it talks to THIS proxy
# (run somewhere you control, e.g. Fly.io), and the proxy is the only thing
# that ever sees the real key. The app authenticates to the proxy with a
# separate, low-stakes "virtual key" that you can revoke instantly without
# touching your Anthropic account.
#
# Run it:
#   pip install 'litellm[proxy]'
#   export ANTHROPIC_API_KEY=sk-ant-...      # the REAL key — lives only here
#   export LITELLM_MASTER_KEY=sk-...         # a key only YOU use, to administer this proxy
#   litellm --config deploy/litellm_config.yaml
#
# Generate the low-stakes key Drew's app actually ships with:
#   curl -X POST http://localhost:4000/key/generate \
#     -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
#     -H "Content-Type: application/json" \
#     -d '{"models": ["claude-haiku-4-5"], "max_budget": 5, "key_alias": "drew-artemis-desktop"}'
#   # -> {"key": "sk-...", ...}  This is what goes in Drew's build as LITELLM_VIRTUAL_KEY
#   # (a different variable from CLAUDE_API_KEY — see app/config.py).
#
# That virtual key is scoped to $5 total spend and only the one model — if it
# ever leaks, revoke it (POST /key/delete) without affecting anything else,
# and your real ANTHROPIC_API_KEY never has to change.
#
# NOTE: verify this against LiteLLM's current docs before deploying — proxy
# config syntax has moved between versions and this file hasn't been run
# against a live LiteLLM instance yet.

model_list:
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Without a database, virtual keys live in memory and reset on restart —
  # fine for a single-user demo you generate one key for. If you outgrow
  # that (multiple users, persistent budgets/revocation across restarts),
  # add a Postgres `database_url` here — see LiteLLM's virtual-keys docs.
